<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Health Monitor (Rule-Based Engine)</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --text-secondary: #636e72;
            --border: #dfe6e9;
            --success: #00b894;
            --warning: #fdcb6e;
            --at-risk: #ff9f43;
            --danger: #ff7675;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; font-weight: 800; color: var(--text); letter-spacing: -1px; margin-bottom: 8px; }
        header p { color: var(--text-secondary); font-size: 1.1rem; }

        .devices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 30px; }
        
        .device-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid var(--border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .device-card:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }

        .device-header { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-start; }
        .device-info h2 { font-size: 1.5rem; color: var(--primary); margin-bottom: 4px; }
        .device-type { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); font-weight: 700; }
        .timestamp { font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px; }

        /* Analyzer Banner */
        .analyzer-banner { 
            padding: 20px; border-radius: 12px; margin-bottom: 25px; 
            display: flex; gap: 15px; align-items: center; 
        }
        .analyzer-banner.Healthy { background: #e8f5e9; border-left: 6px solid var(--success); }
        .analyzer-banner.Watch { background: #fff8e1; border-left: 6px solid var(--warning); }
        .analyzer-banner.At.Risk, .analyzer-banner.At-Risk { background: #fff3e0; border-left: 6px solid var(--at-risk); }
        .analyzer-banner.Critical { background: #ffebee; border-left: 6px solid var(--danger); }
        
        .score-circle {
            width: 70px; height: 70px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; border: 3px solid var(--text); background: white;
        }
        .Healthy .score-circle { border-color: var(--success); color: var(--success); }
        .Watch .score-circle { border-color: var(--warning); color: var(--warning); }
        .At.Risk .score-circle, .At-Risk .score-circle { border-color: var(--at-risk); color: var(--at-risk); }
        .Critical .score-circle { border-color: var(--danger); color: var(--danger); }

        .rules-list { font-size: 0.85rem; margin-top: 10px; }
        .rules-list li { margin-left: 15px; margin-bottom: 3px; color: #444; }
        .rules-list b { color: #222; }

        .actions-list { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.6); border-radius: 8px; font-size: 0.85rem;}
        .actions-list strong { color: var(--danger); }
        .actions-list ul { margin-left: 15px; margin-top: 5px; }

        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; background: var(--bg); }
        
        .section-title { font-size: 0.9rem; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; margin: 25px 0 12px 0; display: flex; align-items: center; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 15px; }

        .metric { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--bg); font-size: 0.9rem; margin-bottom: 0px; }
        .metric:last-child { border-bottom: none; }
        .label { color: var(--text-secondary); font-weight: 500; }
        .val { font-weight: 700; color: var(--text); }

        .disk-item { background: var(--bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .disk-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .disk-drive { font-weight: 800; font-size: 1rem; }
        
        .good { color: var(--success); }
        .warn { color: var(--warning); }
        .crit { color: var(--danger); }

        .no-devices { text-align: center; padding: 100px; grid-column: 1 / -1; background: white; border-radius: 20px; color: var(--text-secondary); border: 2px dashed var(--border); }
        .footer-info { text-align: center; margin-top: 60px; color: var(--text-secondary); font-size: 0.9rem; }
        .footer-info a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Device Health Dashboard</h1>
            <p>Live predictive maintenance diagnostics</p>
        </header>

        <div id="devicesContainer" class="devices-grid"></div>

        <div class="footer-info">
            Updates every 5 seconds | <a href="javascript:location.reload()">Manual Refresh</a>
        </div>
    </div>

    <script>
        function formatValue(val, type) {
            if (val === null || val === undefined) return null;
            if (type === 'percent') {
                let cls = val > 90 ? 'crit' : (val > 75 ? 'warn' : 'good');
                return `<span class="${cls}">${val}%</span>`;
            }
            if (type === 'temp') {
                let cls = val > 75 ? 'crit' : (val > 60 ? 'warn' : 'good');
                return `<span class="${cls}">${val}°C</span>`;
            }
            return typeof val === 'number' && !Number.isInteger(val) ? val.toFixed(1) : val;
        }

        function renderMetric(label, value, type = null) {
            const formatted = formatValue(value, type);
            if (formatted === null) return '';
            return `
                <div class="metric">
                    <span class="label">${label}</span>
                    <span class="val">${formatted}</span>
                </div>
            `;
        }

        function renderDevice(tag, data) {
            const { cpu={}, memory={}, system={}, battery={}, disks=[], analysis=null } = data;
            
            let analysisHtml = '';
            if (analysis) {
                const safeClass = analysis.risk_level.replace(" ", "-");
                let rulesItems = analysis.triggered_rules.map(r => 
                    `<li><b>${r.rule_id}</b>: ${r.label} (+${r.score_contribution}) - <i>${r.note}</i></li>`
                ).join('');
                
                let bonusItems = (analysis.compound_bonuses || []).map(b => 
                    `<li><b>${b.rule_id}</b>: ${b.label} (+${b.bonus})</li>`
                ).join('');

                let actions = analysis.recommended_actions.map(a => `<li>${a}</li>`).join('');

                analysisHtml = `
                    <div class="analyzer-banner ${safeClass}">
                        <div class="score-circle">
                            <span style="font-size: 1.5rem; line-height: 1;">${analysis.total_score}</span>
                            <span style="font-size: 0.6rem; color: #777;">Score</span>
                        </div>
                        <div style="flex:1;">
                            <div style="font-size: 1.1rem; font-weight: bold; margin-bottom: 4px;">${analysis.risk_level} Risk</div>
                            <div style="font-size: 0.8rem; color: #555;">${analysis.summary}</div>
                            ${ (rulesItems || bonusItems) ? `
                                <ul class="rules-list">
                                    ${rulesItems}
                                    ${bonusItems}
                                </ul>
                            ` : '<div style="font-size:0.85rem; color:#666; margin-top:5px;">✅ All metrics excellent. No active rules triggered.</div>'}
                            
                            ${ actions ? `
                                <div class="actions-list">
                                    <strong>Recommended Actions:</strong>
                                    <ul>${actions}</ul>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            } else {
                analysisHtml = `
                    <div class="analyzer-banner" style="background:#eee;">
                        <span style="font-size:0.85rem;color:#777;">Analysis pending or unavailable.</span>
                    </div>
                `;
            }

            let html = `
                <div class="device-card">
                    <div class="device-header">
                        <div class="device-info">
                            <h2>${tag}</h2>
                            <div class="device-type">${data.device_type || 'Unknown'}</div>
                            <div class="timestamp">Collected: ${new Date(data.collected_at).toLocaleString()}</div>
                        </div>
                    </div>

                    ${analysisHtml}

                    <div style="display: flex; gap: 15px;">
                        <div style="flex:1">
                            <div class="section-title" style="margin-top:0;">System</div>
                            ${renderMetric('Uptime', system.uptime_hours ? system.uptime_hours + ' hrs' : null)}
                            ${renderMetric('Last Update', system.last_os_update)}
                        </div>
                        <div style="flex:1">
                            <div class="section-title" style="margin-top:0;">Performance</div>
                            ${renderMetric('CPU Usage', cpu.usage_percent, 'percent')}
                            ${renderMetric('CPU Temp', cpu.temperature_celsius, 'temp')}
                            ${renderMetric('RAM Usage', memory.usage_percent, 'percent')}
                        </div>
                    </div>

                    <div class="section-title">Storage & Drives</div>
                    ${disks.map(disk => `
                        <div class="disk-item">
                            <div class="disk-header">
                                <span class="disk-drive">${disk.drive || 'Physical Drive'}</span>
                                <span class="val">${formatValue(disk.usage_percent, 'percent')}</span>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 15px;">
                                ${renderMetric('Temp', disk.temperature_celsius, 'temp')}
                                ${renderMetric('Wear Level', disk.wear_percent, 'percent')}
                                ${renderMetric('Read Err', disk.read_errors)}
                                ${renderMetric('Write Err', disk.write_errors)}
                                ${renderMetric('Power On', disk.power_on_hours ? disk.power_on_hours + 'h' : null)}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            return html;
        }

        async function load() {
            try {
                const r = await fetch('/api/devices');
                const data = await r.json();
                const container = document.getElementById('devicesContainer');
                
                if (Object.keys(data).length === 0) {
                    container.innerHTML = '<div class="no-devices">📡 Waiting for device telemetry...<br><span style="font-size:0.8rem; margin-top:10px; display:inline-block;">Run <kbd>python collector.py</kbd> on a client machine.</span></div>';
                } else {
                    container.innerHTML = Object.entries(data)
                        .map(([tag, snap]) => renderDevice(tag, snap))
                        .join('');
                }
            } catch (err) {
                console.error('Failed to load devices:', err);
            }
        }

        load();
        setInterval(load, 5000);
    </script>
</body>
</html>
